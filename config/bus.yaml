# khonliang-bus configuration
# Run as: ./bin/khonliang-bus -config config/bus.yaml

listen: ":8787"

backend:
  type: sqlite
  sqlite:
    path: /mnt/dev/ttoll/dev/khonliang-bus/data/bus.db
  retention:
    messages_ttl: 168h        # 7 days

registry:
  heartbeat_interval: 30s

allowed_origins:
  - http://localhost:*
  - http://127.0.0.1:*
